# Statistics Queries

query GetTokenStatistics($tokenId: ID!, $tokenAddress: Bytes!) {
  token(id: $tokenId) {
    id
    symbol
    name
    totalSupply
    holderCount
  }
  dailySnapshots(
    first: 30
    orderBy: date
    orderDirection: desc
    where: { token_: { id: $tokenAddress } }
  ) {
    id
    date
    transferCount
    mintCount
    burnCount
    uniqueAddresses
    mintVolume
    burnVolume
    holderCount
  }
}
