# Token Queries

query GetToken($id: ID!) {
  token(id: $id) {
    id
    address
    symbol
    name
    decimals
    totalSupply
    holderCount
  }
}

query GetTokens($first: Int = 10, $skip: Int = 0) {
  tokens(first: $first, skip: $skip, orderBy: holderCount, orderDirection: desc) {
    id
    address
    symbol
    name
    decimals
    totalSupply
    holderCount
  }
}

# Transfer Queries

query GetTransfers(
  $first: Int = 100
  $skip: Int = 0
  $orderBy: Transfer_orderBy
  $orderDirection: OrderDirection
  $where: Transfer_filter
) {
  transfers(
    first: $first
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    where: $where
  ) {
    id
    token {
      id
      symbol
      name
      decimals
    }
    from
    to
    amount
    isMint
    isBurn
    blockNumber
    blockTimestamp
    transactionHash
    logIndex
  }
}

query GetTransfersByToken(
  $token: String!
  $first: Int = 100
  $skip: Int = 0
) {
  transfers(
    first: $first
    skip: $skip
    orderBy: blockTimestamp
    orderDirection: desc
    where: { token: $token }
  ) {
    id
    token {
      id
      symbol
      name
      decimals
    }
    from
    to
    amount
    isMint
    isBurn
    blockNumber
    blockTimestamp
    transactionHash
    logIndex
  }
}

query GetTransfersByAddress(
  $address: Bytes!
  $first: Int = 100
  $skip: Int = 0
) {
  transfers(
    first: $first
    skip: $skip
    orderBy: blockTimestamp
    orderDirection: desc
    where: {
      or: [
        { from: $address }
        { to: $address }
      ]
    }
  ) {
    id
    token {
      id
      symbol
      name
      decimals
    }
    from
    to
    amount
    isMint
    isBurn
    blockNumber
    blockTimestamp
    transactionHash
    logIndex
  }
}

# Token Account Queries

query GetTokenAccount($id: ID!) {
  tokenAccount(id: $id) {
    id
    token {
      id
      symbol
      name
      decimals
    }
    account
    balance
  }
}

query GetTokenAccountsByToken(
  $token: String!
  $first: Int = 100
  $skip: Int = 0
) {
  tokenAccounts(
    first: $first
    skip: $skip
    orderBy: balance
    orderDirection: desc
    where: { token: $token }
  ) {
    id
    account
    balance
  }
}

query GetTokenAccountsByAddress(
  $address: Bytes!
  $first: Int = 10
  $skip: Int = 0
) {
  tokenAccounts(
    first: $first
    skip: $skip
    orderBy: balance
    orderDirection: desc
    where: { account: $address }
  ) {
    id
    token {
      id
      symbol
      name
      decimals
    }
    balance
  }
}

# Daily Snapshot Queries

query GetDailySnapshots(
  $token: String!
  $date_gte: BigInt!
  $date_lte: BigInt!
  $first: Int = 100
) {
  dailySnapshots(
    first: $first
    orderBy: date
    orderDirection: asc
    where: {
      token: $token
      date_gte: $date_gte
      date_lte: $date_lte
    }
  ) {
    id
    date
    transferCount
    mintCount
    burnCount
    uniqueAddresses
    mintVolume
    burnVolume
    holderCount
  }
}

query GetLatestDailySnapshot($token: String!) {
  dailySnapshots(
    first: 1
    orderBy: date
    orderDirection: desc
    where: { token: $token }
  ) {
    id
    date
    transferCount
    mintCount
    burnCount
    uniqueAddresses
    mintVolume
    burnVolume
    holderCount
  }
}

