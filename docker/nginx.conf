# MSQ Transaction Monitor - Nginx Reverse Proxy Configuration
# Routes all services through a single domain to avoid CORS issues
# Implements rate limiting for API and WebSocket endpoints

events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    # API endpoints: 100 requests per minute (burst of 20)
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    # WebSocket endpoints: 10 requests per second (burst of 5)
    limit_req_zone $binary_remote_addr zone=ws:10m rate=10r/s;

    # Trust X-Forwarded-* headers from AWS LB/Cloudflare
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;  # Trust all proxies (AWS LB/Cloudflare)

    # Upstream service definitions
    upstream tx-dashboard {
        server tx-dashboard:3000;
    }

    # upstream tx-dashboard-v2 {
    #     server tx-dashboard-v2:3001;
    # }

    upstream tx-api {
        server tx-api:8000;
    }

    upstream chain-scanner {
        server chain-scanner:8001;
    }

    # Main server configuration
    server {
        listen 80;
        server_name localhost;

        # Enable gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # Frontend v2 - Next.js Dashboard (Default) - DISABLED
        # Serves the new Next.js application UI
        # location / {
        #     proxy_pass http://tx-dashboard-v2;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_cache_bypass $http_upgrade;
        # }

        # Root redirect to v1 dashboard
        location = / {
            return 301 /v1/;
        }

        # Frontend v1 - React Dashboard (Now Default)
        # Serves the original Vite/React application
        # Note: Vite is configured with base: '/v1/' so paths are preserved
        location /v1/ {
            proxy_pass http://tx-dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # REST API - All API v1 endpoints
        # Consolidated location for all /api/v1/* routes
        # Rate limited to 100 requests per minute with burst of 20
        location /api/v1/ {
            # Apply rate limiting
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://tx-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        }

        # WebSocket - Real-time Transaction Updates
        # Proxies WebSocket connections from chain-scanner
        # Rate limited to 10 requests per second with burst of 5
        location /ws {
            # Apply WebSocket rate limiting
            limit_req zone=ws burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://chain-scanner;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout settings
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
